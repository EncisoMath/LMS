```yaml
name: Eliminar todos los archivos del repositorio

on:
  workflow_dispatch:
    inputs:
      confirmacion:
        description: 'Escribe ELIMINAR para confirmar'
        required: true
        default: ''

permissions:
  contents: write

jobs:
  limpiar-repositorio:
    if: ${{ github.event.inputs.confirmacion == 'ELIMINAR' }}
    runs-on: ubuntu-latest

    steps:
      - name: Descargar repositorio
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configurar Git
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

      - name: Eliminar todos los archivos rastreados
        run: |
          git rm -r --ignore-unmatch .

      - name: Confirmar cambios
        run: |
          git commit -m "chore: eliminar todos los archivos del repositorio" || echo "No hay archivos para eliminar"

      - name: Subir cambios
        run: |
          git push
```
