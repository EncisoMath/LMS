<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 520" role="img" aria-label="Ejemplo visual de quiz estadistico">
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#eef5ff"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#0b1020" flood-opacity="0.22"/>
    </filter>
  </defs>
  <rect width="900" height="520" rx="22" fill="url(#bg)"/>
  <g opacity="0.11" fill="none" stroke="#253858" stroke-width="2">
    <path d="M0 110H900M0 220H900M0 330H900M0 440H900"/>
    <path d="M110 0V520M220 0V520M330 0V520M440 0V520M550 0V520M660 0V520M770 0V520"/>
  </g>
  <g transform="translate(110 90)" filter="url(#shadow)">
    <rect x="0" y="0" width="680" height="330" rx="20" fill="#ffffff"/>
    <text x="34" y="56" font-family="Inter,Arial,sans-serif" font-size="28" font-weight="800" fill="#111827">Encuesta: fruta favorita</text>
    <text x="34" y="90" font-family="Inter,Arial,sans-serif" font-size="18" fill="#617089">Observa las frecuencias y responde.</text>
    <g transform="translate(70 125)">
      <line x1="0" y1="185" x2="520" y2="185" stroke="#cbd5e1" stroke-width="4"/>
      <line x1="0" y1="0" x2="0" y2="185" stroke="#cbd5e1" stroke-width="4"/>
      <rect x="35" y="75" width="70" height="110" rx="8" fill="#e21b3c"/>
      <rect x="155" y="35" width="70" height="150" rx="8" fill="#1368ce"/>
      <rect x="275" y="105" width="70" height="80" rx="8" fill="#d89e00"/>
      <rect x="395" y="15" width="70" height="170" rx="8" fill="#26890c"/>
      <text x="48" y="220" font-family="Inter,Arial,sans-serif" font-size="18" font-weight="700" fill="#334155">Mora</text>
      <text x="158" y="220" font-family="Inter,Arial,sans-serif" font-size="18" font-weight="700" fill="#334155">Mango</text>
      <text x="286" y="220" font-family="Inter,Arial,sans-serif" font-size="18" font-weight="700" fill="#334155">Pera</text>
      <text x="393" y="220" font-family="Inter,Arial,sans-serif" font-size="18" font-weight="700" fill="#334155">Banano</text>
    </g>
  </g>
</svg>
