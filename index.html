<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
  <title>EncisoMath</title>
  <meta name="description" content="AVA/LMS móvil para EncisoMath" />
  <meta name="theme-color" content="#062f4f" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <link rel="manifest" href="./manifest.webmanifest" />
  <link rel="icon" href="./assets/app-icon-192.png" />
  <link rel="apple-touch-icon" sizes="180x180" href="./assets/apple-touch-icon-180.png" />
  <link rel="stylesheet" href="./styles.css?v=0.25.009" />
</head>
<body>
  <noscript>EncisoMath necesita JavaScript activo para funcionar.</noscript>
  <div id="app" class="app-shell"></div>
  <div id="toast" class="toast" aria-live="polite"></div>
  <!-- Supabase fijado a una versión estable. UNPKG queda como respaldo si jsDelivr falla. -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.49.1/dist/umd/supabase.js"></script>
  <script>
    if (!window.supabase || typeof window.supabase.createClient !== 'function') {
      document.write('<script src="https://unpkg.com/@supabase/supabase-js@2.49.1/dist/umd/supabase.js"><\/script>');
    }
  </script>
  <script src="./supabase-config.js?v=0.25.009"></script>
  <script src="./supabase-adapter.js?v=0.25.009"></script>
  <script src="./offline-engine.js?v=0.25.009"></script>
  <script src="./app.js?v=0.25.009"></script>
</body>
</html>
